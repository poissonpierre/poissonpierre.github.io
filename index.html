<!DOCTYPE html>
<html lang="fr">
<head>
<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
  }
  #grille {
    display: flex;
    flex-wrap: wrap;
    width: 100vw;
    height: 100vh;
    align-content: flex-start;
  }
  .oeil-wrap {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .oeil {
    width: 58px;
    height: 38px;
    background: white;
    border-radius: 50%;
    border: 2px solid #333;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pupille {
    width: 18px;
    height: 18px;
    background: #111;
    border-radius: 50%;
    position: absolute;
  }
</style>
</head>
<body>
<div id="grille"></div>
<script>
  const grille = document.getElementById('grille');
  const cols = Math.floor(window.innerWidth / 80);
  const rows = Math.floor(window.innerHeight / 80);

  for (let i = 0; i < cols * rows; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'oeil-wrap';
    wrap.innerHTML = '<div class="oeil"><div class="pupille"></div></div>';
    grille.appendChild(wrap);
  }

  document.addEventListener('mousemove', (e) => {
    document.querySelectorAll('.oeil-wrap').forEach(wrap => {
      const rect = wrap.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const angle = Math.atan2(e.clientY - cy, e.clientX - cx);
      const px = Math.cos(angle) * 9;
      const py = Math.sin(angle) * 9;
      wrap.querySelector('.pupille').style.transform =
        `translate(${px}px, ${py}px)`;
    });
  });
</script>
</body>
</html>
