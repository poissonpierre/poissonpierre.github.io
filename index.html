<!DOCTYPE html>
<html lang="fr">
<head>
<style>

  /* LES YEUX — fixés en arrière-plan */
  #grille {
    position: fixed;       /* ← reste en place même si on scrolle */
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    background: #000;
    z-index: 0;            /* ← tout en bas */
  }

  .oeil-wrap { /* ... ton CSS des yeux ... */ }
  .oeil      { /* ... */ }
  .pupille   { /* ... */ }

  /* TON CONTENU — par-dessus les yeux */
  #contenu {
    position: relative;
    z-index: 10;           /* ← au-dessus des yeux */
    padding: 40px;
  }

  .box {
    background: rgba(0, 0, 0, 0.75);   /* ← fond semi-transparent */
    border: 2px solid #ff0000;
    color: white;
    padding: 20px;
    margin-bottom: 20px;
    font-family: "Comic Sans MS", cursive;
  }

</style>
</head>
<body>

  <!-- FOND : les yeux -->
  <div id="grille"></div>

  <!-- CONTENU : par-dessus -->
  <div id="contenu">
    <div class="box">
      <h2>Titre de ma box</h2>
      <p>Du texte par-dessus les yeux !</p>
    </div>
    <div class="box">
      <p>Une autre box...</p>
    </div>
  </div>

  <script>
    /* ... ton JS des yeux ... */
  </script>

</body>
</html>
